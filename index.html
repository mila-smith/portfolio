            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: {
                    parts: [{ text: systemInstruction }]
                }
            };

            const fetchWithBackoff = async (retries = 3, delay = 1000) => {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        if (response.status === 429 && retries > 0) {
                            await new Promise(resolve => setTimeout(resolve, delay));
                            return fetchWithBackoff(retries - 1, delay * 2);
                        }
                        throw new Error(`HTTP Error ${response.status}: ${response.statusText}`);
                    }
                    return await response.json();
                } catch (err) {
                    if (retries > 0) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return fetchWithBackoff(retries - 1, delay * 2);
                    }
                    throw err;
                }
            };

            try {
                const result = await fetchWithBackoff();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) {
                console.error("Gemini connection error:", err);
                throw err;
            }
        };

                                                                        className="block text-[9px] bg-slate-50 border border-slate-100 rounded p-1 text-indigo-700 font-semibold truncate hover:bg-indigo-50"
                                                                    >
                                                                        🔗 {cred.label.replace("Verify: ", "")}
                                                                    </a>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* MINIMALIST MODERN */}
                                    {layout === 'modern' && (
                                        <div className="p-12 space-y-8">
                                            <div className="flex flex-col md:flex-row gap-6 items-center border-b pb-6">
                                                <div className="w-28 h-28 rounded-full overflow-hidden border-2 border-slate-200 shadow-sm flex-shrink-0 bg-slate-50">
                                                    <img src={currentPhotoSrc} alt={profile.name} className="w-full h-full object-cover" />
                                                </div>
                                                <div className="text-center md:text-left space-y-1 flex-grow">
                                                    <h1 className="text-2xl font-bold tracking-tight text-slate-900">{profile.name}</h1>
                                                    <p className={`text-xs font-extrabold tracking-widest uppercase ${activeColors.text}`}>{profile.title}</p>
                                                    <div className="flex flex-wrap justify-center md:justify-start gap-3 text-[10px] text-slate-400 pt-1">
                                                        <span>📧 {profile.email}</span>
                                                        <span>📱 {profile.phone1}</span>
                                                        <span>📍 {profile.location}</span>
                                                    </div>
                                                </div>
                                            </div>

                                            <div>
                                                <h2 className={`text-[10px] font-extrabold uppercase tracking-widest ${activeColors.text} mb-2`}>Executive Profile</h2>
                                                <p className="text-[10px] text-slate-600 leading-relaxed text-justify">{profile.summary}</p>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                <div className="md:col-span-2 space-y-6">
                                                    <div>
                                                        <h2 className="text-[10px] font-extrabold uppercase tracking-widest text-slate-700 mb-3 border-b pb-0.5">Career Chronology</h2>
                                                        <div className="space-y-3">
                                                            {profile.experience.map((exp, idx) => (
                                                                <div key={idx} className="space-y-0.5">
                                                                    <div className="flex justify-between items-baseline">
                                                                        <h4 className="text-[10px] font-bold text-slate-800">{exp.role}</h4>
                                                                        <span className="text-[9px] text-slate-400 font-semibold">{exp.period}</span>
                                                                    </div>
                                                                    <p className="text-[9px] text-indigo-600 font-semibold">{exp.org}</p>
                                                                    <p className="text-[9px] text-slate-500 leading-relaxed">{exp.desc}</p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div>
                                                        <h2 className="text-[10px] font-extrabold uppercase tracking-widest text-slate-700 mb-3 border-b pb-0.5">Academics</h2>
                                                        <div className="space-y-2">
                                                            {profile.education.map((edu, idx) => (
                                                                <div key={idx} className="space-y-0.5">
                                                                    <div className="flex justify-between">
                                                                        <h4 className="text-[10px] font-bold text-slate-800">{edu.degree}</h4>
                                                                        <span className="text-[9px] text-slate-400">{edu.period}</span>
                                                                    </div>
                                                                    <p className="text-[9px] text-slate-400 font-semibold">{edu.institution} {edu.details && `• ${edu.details}`}</p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="space-y-6">
                                                    <div>
                                                        <h2 className="text-[10px] font-extrabold uppercase tracking-widest text-slate-700 mb-2.5 border-b pb-0.5">Certificates</h2>
                                                        <ul className="space-y-1">
                                                            {profile.qualifications.map((qual, idx) => (
                                                                <li key={idx} className="text-[9px] text-slate-500 flex items-center gap-1">
                                                                    <span className="w-1 h-1 rounded-full bg-slate-400"></span>
                                                                    {qual}
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>

                                                    <div>
                                                        <h2 className="text-[10px] font-extrabold uppercase tracking-widest text-slate-700 mb-2.5 border-b pb-0.5">Verified Badges</h2>
                                                        <div className="space-y-1">
                                                            {profile.credentials.map((cred, idx) => (
                                                                <a 
                                                                    key={idx} 
                                                                    href={cred.url} 
                                                                    target="_blank" 
                                                                    className="block text-[9px] bg-slate-50 border p-1 rounded text-slate-600 truncate hover:text-indigo-600"
                                                                >
                                                                    🔗 {cred.label.replace("Verify: ", "")}
                                                                </a>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {activeTab === 'ai-chat' && (
                        <div className="max-w-4xl mx-auto space-y-6 animate-fadeIn">
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-slate-900 text-white p-6 flex items-center justify-between">
                                    <div className="flex items-center gap-3">
                                        <div className="w-12 h-12 rounded-full overflow-hidden border-2 border-indigo-400">
                                            <img src="photo_2026-07-16_08-42-35.jpg" alt="Miliyion Avatar" className="w-full h-full object-cover" />
                                        </div>
                                        <div>
                                            <h3 className="text-sm font-bold tracking-wide">Miliyion's AI Recruiter Avatar</h3>
                                            <span className="inline-flex items-center gap-1 text-[10px] text-indigo-300 font-bold uppercase tracking-wider">
                                                <span className="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-ping"></span> Live & Powered by Gemini
                                            </span>
                                        </div>
                                    </div>
                                    <span className="text-xs text-slate-400 hidden sm:block">Ask about Exit Exams, TVET levels, or project details!</span>
                                </div>

                                {/* Chat workspace container */}
                                <div className="h-96 overflow-y-auto p-6 bg-slate-50/50 space-y-4 custom-scroll">
                                    {chatMessages.map((msg, idx) => (
                                        <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-xl rounded-2xl p-4 text-xs leading-relaxed ${
                                                msg.sender === 'user' 
                                                    ? 'bg-indigo-600 text-white shadow-md' 
                                                    : 'bg-white text-slate-800 shadow-sm border border-slate-200/80'
                                            }`}>
                                                <p>{msg.text}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {chatLoading && (
                                        <div className="flex justify-start">
                                            <div className="bg-white border border-slate-200 rounded-2xl p-4 flex items-center gap-2">
                                                <div className="flex gap-1">
                                                    <div className="w-1.5 h-1.5 rounded-full bg-slate-400 animate-bounce delay-100"></div>
                                                    <div className="w-1.5 h-1.5 rounded-full bg-slate-400 animate-bounce delay-200"></div>
                                                    <div className="w-1.5 h-1.5 rounded-full bg-slate-400 animate-bounce delay-300"></div>
                                                </div>
                                                <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Formulating Response...</span>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>

                                {/* Chat input tools */}
                                <form onSubmit={handleSendChatMessage} className="p-4 bg-white border-t border-slate-200 flex gap-2">
                                    <input 
                                        type="text"
                                        value={chatInput}
                                        onChange={(e) => setChatInput(e.target.value)}
                                        placeholder="Ask: 'What was your Exit Exam score?' or 'Tell me about your TVET certifications...'"
                                        className="flex-grow border border-slate-200 rounded-xl px-4 py-2 text-xs focus:outline-none focus:border-indigo-500"
                                        disabled={chatLoading}
                                    />
                                    <button 
                                        type="submit"
                                        className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-300 text-white text-xs font-bold px-4 py-2 rounded-xl transition"
                                        disabled={chatLoading}
                                    >
                                        Send
                                    </button>
                                </form>
                            </div>

                            {/* Preset queries */}
                            <div className="bg-slate-100 rounded-2xl p-4">
                                <span className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2.5">Suggested Recruiter Queries</span>
                                <div className="flex flex-wrap gap-2">
                                    {[
                                        "Where did you study Computer Science?",
                                        "What was your MoE Exit Exam score?",
                                        "Describe your network experience at Entoto TVET.",
                                        "Show me your driving license capabilities.",
                                        "Tell me about your work at the Driver & Vehicle Licensing Authority."
                                    ].map((q, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => {
                                                setChatInput(q);
                                            }}
                                            className="bg-white hover:bg-indigo-50 border border-slate-200 rounded-xl px-3 py-1.5 text-[10px] font-bold text-slate-700 transition"
                                        >
                                            💡 {q}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {}
                    {activeTab === 'credentials' && (
                        <div className="space-y-6 animate-fadeIn">
                            <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                                <h3 className="text-sm font-extrabold uppercase tracking-widest text-slate-900 mb-2">Verified Professional Credentials</h3>
                                <p className="text-xs text-slate-500 mb-6">Miliyion holds multiple verified certifications, exit badges, and technical specialization credentials. Feel free to access the official verify links directly.</p>

                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {profile.credentials.map((cred, idx) => (
                                        <div key={idx} className="bg-slate-50 p-4 rounded-2xl border border-slate-200/60 hover:border-indigo-300 transition space-y-3">
                                            <div className="flex items-center gap-2">
                                                <span className="text-xl">🎖️</span>
                                                <h4 className="text-xs font-bold text-slate-800 truncate">{cred.label.replace("Verify: ", "")}</h4>
                                            </div>
                                            <p className="text-[10px] text-slate-400 leading-relaxed">
                                                Official verified badge detailing credentials in Python programming, automated diagnostics, Android frameworks, or capital market strategies.
                                            </p>
                                            <a 
                                                href={cred.url}
                                                target="_blank"
                                                className="inline-flex items-center gap-1 bg-white hover:bg-slate-100 border border-slate-200 rounded-lg px-3 py-1.5 text-[10px] font-bold text-indigo-700 transition w-full justify-center"
                                            >
                                                🔗 Access Verification Link
                                            </a>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'gallery' && (
                        <div className="space-y-6 animate-fadeIn">
                            <div className="bg-white rounded-3xl p-6 border border-slate-200 shadow-sm">
                                <div className="flex flex-col sm:flex-row items-center justify-between gap-4 border-b pb-4 mb-6">
                                    <div>
                                        <h3 className="text-sm font-extrabold uppercase tracking-widest text-slate-900">Dynamic Photo Studio</h3>
                                        <p className="text-xs text-slate-500 mt-0.5">Browse through Miliyion's graduation, studio suit, and casual portraits. Select any to make it the default CV avatar!</p>
                                    </div>
                                    <label className="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-xl cursor-pointer transition">
                                        📤 Upload Custom Portrait
                                        <input type="file" accept="image/*" onChange={handleFileUpload} className="hidden" />
                                    </label>
                                </div>

                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                                    {GALLERY_PHOTOS.map((photo) => (
                                        <div 
                                            key={photo.id}
                                            className={`group relative rounded-2xl overflow-hidden border-2 aspect-[4/5] bg-slate-100 transition-all duration-300 ${
                                                selectedPhoto === photo.src && !customPhoto 
                                                    ? 'border-indigo-600 ring-4 ring-indigo-100' 
                                                    : 'border-slate-200 hover:border-slate-300'
                                            }`}
                                        >
                                            <img src={photo.src} alt={photo.label} className="w-full h-full object-cover" />
                                            
                                            {/* Action overlay mask */}
                                            <div className="absolute inset-0 bg-slate-900/60 opacity-0 group-hover:opacity-100 transition duration-200 flex flex-col justify-between p-3 text-center">
                                                <span className="text-[9px] bg-indigo-600 text-white font-bold uppercase tracking-wider rounded px-1.5 py-0.5 align-self-start self-start">
                                                    {photo.category}
                                                </span>
                                                <div className="space-y-1.5">
                                                    <p className="text-[10px] text-white font-bold leading-tight truncate">{photo.label}</p>
                                                    <button 
                                                        onClick={() => {
                                                            setCustomPhoto(null);
                                                            setSelectedPhoto(photo.src);
                                                            showToast("Primary portrait changed successfully!");
                                                        }}
                                                        className="bg-white text-slate-950 font-bold text-[9px] px-2.5 py-1 rounded shadow hover:bg-slate-100 w-full"
                                                    >
                                                        Use on Resume
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </main>

                {/* Footer block */}
                <footer className="bg-slate-950 text-slate-500 py-6 border-t border-slate-900 text-center text-xs no-print">
                    <p>© {new Date().getFullYear()} Miliyion Addisu Belay. All Rights Reserved.</p>
                    <p className="text-[10px] text-slate-600 mt-1">Designed as a high-fidelity web customizer & recruitment co-pilot.</p>
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
